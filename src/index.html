document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 ctlLabels: \"Peak-Beschriftungen\", ctlHarm: \"Harmonisch zeigen\", ctlAnh: \"Anharmonisch zeigen\", ctlInvert: \"Achse umkehren\", ctlNormalize: \"Normieren\", ctlScaleMax: \"Skala max %\", ctlSymmetric: \"Symmetrische Skala\", ctlLineW: \"Linienbreite\", ctlContrast: \"Kontrast\", ctlMarkers: \"Peak-Marker\", ctlRelE: \"Relativ zum niedrigsten\", ctlUnit: \"Energieeinheit\", ctlMinIR: \"Min. IR-Intensität\", ctlMassW: \"Massegewichtet\",\n      tt_bondTol: \"Faktor auf die Summe der Kovalenzradien zur Bindungserkennung. H\\u00f6her = mehr Bindungen.\",\n      tt_linAngle: \"Winkel \\u00fcber diesem Wert gelten als linear und werden mit zwei senkrechten Biegungen behandelt.\",\n      tt_intFrac: \"Mindestanteil eines Modus, der durch interne Koordinaten erfasst sein muss, bevor er benannt wird; darunter gilt er als Ger\\u00fcst-/Deformationsmodus.\",\n      tt_dom: \"Ein einzelner Koordinatentyp ab diesem Anteil benennt den Modus direkt (z.\\u202fB. reines \\u03bd(C\\u2013O)).\",\n      tt_coup: \"Zwei Koordinatentypen jeweils \\u00fcber diesem Anteil werden als gekoppelter Modus angegeben.\",\n      tt_massW: \"Beteiligungsverh\\u00e4ltnis mit der Atommasse gewichten, betont schwere Atome.\",\n      tt_fwhm: \"Halbwertsbreite der Lorentz-Linienform \\u2014 verbreitert oder sch\\u00e4rft die simulierten Banden.\",\n      tt_topLabels: \"Wie viele der st\\u00e4rksten sichtbaren Banden eine Charakter-Beschriftung erhalten.\",\n      tt_showHarm: \"Harmonisches Spektrum zeigen (gestrichelt).\", tt_showAnharm: \"Anharmonisches VPT2-Spektrum zeigen (gef\\u00fcllt).\",\n      tt_invert: \"Hohe Wellenzahlen links darstellen, wie in der IR-Spektroskopie \\u00fcblich.\",\n      tt_normalize: \"H\\u00f6chsten Peak auf 1 skalieren statt absoluter Intensit\\u00e4t.\",\n      tt_forks: \"Verbindet harmonische und anharmonische Position jeder beschrifteten Mode mit einer Gabel, die die Verschiebung zeigt.\",\n      tt_eqMode: \"Jede Mode mit gleicher Bandenh\\u00f6he zeichnen, damit Bandenpositionen unabh\\u00e4ngig von der Intensit\\u00e4t vergleichbar sind.\",\n      tt_useHarm: \"Harmonische statt anharmonische Spektren \\u00fcberlagern.\",\n      tt_lower: \"Untere Grenze des Fensters (cm\\u207b\\u00b9).\", tt_upper: \"Obere Grenze des Fensters (cm\\u207b\\u00b9).\",\n      tt_amp: \"Auslenkungsvektoren \\u00fcberh\\u00f6hen, um die Bewegung sichtbarer zu machen.\",\n      tt_minIR: \"Moden unterhalb dieser harmonischen IR-Intensit\\u00e4t ausblenden.\",\n      tt_onlyRegion: \"Liste auf Moden im Spektral-Interessenbereich beschr\\u00e4nken.\",\n    };\n    return { en, de };\n  }\n\n  componentDidUpdate() { this.redrawCurrent(); if (this.state.tab === \"structure\") this.maybeRefresh3D(); if (this.state.tab === \"opt\") this.maybeRefreshOpt(); if (this.state.tab === \"scan\") this.maybeRefreshScan(); if (this.state.tab === \"charges\") this.maybeRefreshChg(); if (this.state.tab === \"compare\" && this.state.compare.view === \"overlay\") this.maybeRefreshOverlay(); this._syncOptTimer(); this._syncScanTimer(); }\n\n  // ---------- data ----------\n  activeLog() {\n    const s = this.state;\n    const g = s.groups.find(x => x.id === s.activeLogId && x.kind === \"series\");\n    if (g) { const sl = this.seriesLog(g); if (sl) return sl; }\n    return s.logs.find(l => l.id === s.activeLogId) || s.logs[0] || null;\n  }\n  activeAnalysis() { const l = this.activeLog(); return l ? l.analysis : null; }\n  selMode() { const a = this.activeAnalysis(); if (!a) return null; return a.modes.find(m => m.mode === this.state.selModeKey) || null; }\n\n  addLog(name, text) {\n    let analysis;\n    try { analysis = window.GaussianAnalyzer.analyzeLog(text, this.state.params); }\n    catch (e) { this.setState({ loadError: name + \": \" + e.message }); return; }\n    const id = \"log\" + Date.now() + Math.random().toString(36).slice(2, 6);\n    const hasModes = analysis.modes.length > 0;\n    const strongest = hasModes ? analysis.modes.reduce((b, m) => (m.irHarm > (b ? b.irHarm : -1) ? m : b), null) : null;\n    // transition states: open on the imaginary mode (most negative) so the reaction motion is front-and-centre\n    const imag = hasModes ? analysis.modes.filter(m => m.freqHarm < 0).sort((x, y) => x.freqHarm - y.freqHarm) : [];\n    const initSel = imag.length ? imag[0] : strongest;\n    const maxF = hasModes ? Math.max.apply(null, analysis.modes.map(m => m.freqHarm)) : 0;\n    this.setState(s => {\n      const color = this.LOGCOLORS[s.logs.length % this.LOGCOLORS.length];\n      return {\n        logs: s.logs.concat([{ id, name, text, analysis, color, groupId: null }]),\n        activeLogId: id, selModeKey: initSel ? initSel.mode : null,\n        loadError: null,\n        tab: this._fixTab(analysis, s.tab),\n        opt: Object.assign({}, s.opt, { step: 0, playing: false, run: \"all\" }),\n        spec: hasModes ? Object.assign({}, s.spec, { lo: 0, hi: Math.round(maxF * 1.03), _set: true }) : s.spec,\n        compare: Object.assign({}, s.compare, { sel: Object.assign({}, s.compare.sel, { [id]: true }) }),\n      };\n    }, () => this._refreshSeriesSuggestion());\n  }\n\n\n\n  recompute() {\n    clearTimeout(this._rc);\n    this._rc = setTimeout(() => {\n      this.setState(s => ({\n        logs: s.logs.map(l => {\n          try { return Object.assign({}, l, { analysis: window.GaussianAnalyzer.analyzeLog(l.text, s.params) }); }\n          catch (e) { return l; }\n        })\n      }), () => { this._sig3d = \"\"; this.maybeRefresh3D(); });\n    }, 130);\n  }\n\n  // ---------- sessions (save/restore whole workspace) ----------\n  // Sessions store the RAW log text (not the parsed analysis) plus every UI/parameter setting, so a\n  // reloaded session is re-parsed with the current parser — staying compatible across app updates.\n  _serializeSession() {\n    const s = this.state; const clone = (o) => JSON.parse(JSON.stringify(o == null ? null : o));\n    return {\n      version: 2, app: \"ama\",\n      logs: s.logs.map(l => ({ id: l.id, name: l.name, text: l.text, color: l.color, groupId: l.groupId || null })),\n      groups: clone(s.groups), activeLogId: s.activeLogId, selModeKey: s.selModeKey, tab: s.tab,\n      split: s.split, splitRatio: s.splitRatio, splitSync: s.splitSync, paneB: clone(s.paneB),\n      dismissedSuggest: clone(s.dismissedSuggest),\n      params: clone(s.params), spec: clone(s.spec), exp: clone(s.exp), iso: clone(s.iso),\n      delta: clone(s.delta), obs: clone(s.obs), energy: clone(s.energy), table: clone(s.table),\n      view3d: clone(s.view3d), ligUI: clone(s.ligUI), opt: clone(s.opt), scan: clone(s.scan),\n      chg: clone(s.chg), orb: clone(s.orb), compare: clone(s.compare), overlay: clone(s.overlay),\n      filterQuery: s.filterQuery, filterRegion: s.filterRegion, modeBasis: s.modeBasis, showDomIC: s.showDomIC,\n    };\n  }\n  _applySession(p) {\n    if (!p || p.app !== \"ama\" || !Array.isArray(p.logs) || !window.GaussianAnalyzer) { this.setState({ sessionError: this.t(\"sessBadFile\"), loadError: this.t(\"sessBadFile\") }); return; }\n    const params = Object.assign({}, this.state.params, p.params || {});\n    const logs = (p.logs || []).map(l => {\n      let analysis = null; try { analysis = window.GaussianAnalyzer.analyzeLog(l.text, params); } catch (e) {}\n      return analysis ? { id: l.id, name: l.name, text: l.text, color: l.color, groupId: l.groupId || null, analysis } : null;\n    }).filter(Boolean);\n    if (!logs.length) { this.setState({ sessionError: this.t(\"sessBadFile\"), loadError: this.t(\"sessBadFile\") }); return; }\n    const merge = (k) => Object.assign({}, this.state[k], p[k] || {});\n    const activeLogId = logs.find(l => l.id === p.activeLogId) ? p.activeLogId : logs[0].id;\n    this.setState({\n      logs, groups: p.groups || [], activeLogId, selModeKey: p.selModeKey == null ? null : p.selModeKey,\n      tab: p.tab || \"structure\",\n      split: !!p.split, splitRatio: typeof p.splitRatio === \"number\" ? p.splitRatio : 0.5, splitSync: p.splitSync !== false,\n      paneB: Object.assign({}, this.state.paneB, p.paneB || {}),\n      dismissedSuggest: p.dismissedSuggest || {}, params,\n      spec: merge(\"spec\"), exp: merge(\"exp\"), iso: merge(\"iso\"), delta: merge(\"delta\"),\n      obs: p.obs || this.state.obs, energy: merge(\"energy\"), table: merge(\"table\"),\n      view3d: merge(\"view3d\"), ligUI: merge(\"ligUI\"), opt: merge(\"opt\"), scan: merge(\"scan\"),\n      chg: merge(\"chg\"), orb: merge(\"orb\"), compare: merge(\"compare\"), overlay: merge(\"overlay\"),\n      filterQuery: p.filterQuery || \"\", filterRegion: !!p.filterRegion, modeBasis: p.modeBasis || \"harm\",\n      showDomIC: !!p.showDomIC, sessionsOpen: false, sessionBusy: \"\", sessionError: \"\", loadError: null,\n    }, () => { this._sig3d = \"\"; this._seriesCache = {}; this.maybeRefresh3D(); this.redrawCurrent(); });\n  }\n  _openDB() {\n    if (this._dbP) return this._dbP;\n    this._dbP = new Promise((res, rej) => {\n      let req; try { req = indexedDB.open(\"amaSessions\", 1); } catch (e) { rej(e); return; }\n      req.onupgradeneeded = () => { const db = req.result; if (!db.objectStoreNames.contains(\"meta\")) db.createObjectStore(\"meta\", { keyPath: \"id\" }); if (!db.objectStoreNames.contains(\"data\")) db.createObjectStore(\"data\", { keyPath: \"id\" }); };\n      req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error);\n    });\n    return this._dbP;\n  }\n  _idbAll(store) { return this._openDB().then(db => new Promise((res, rej) => { const r = db.transaction(store, \"readonly\").objectStore(store).getAll(); r.onsuccess = () => res(r.result || []); r.onerror = () => rej(r.error); })); }\n  _idbGet(store, id) { return this._openDB().then(db => new Promise((res, rej) => { const r = db.transaction(store, \"readonly\").objectStore(store).get(id); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); })); }\n  _idbPut(store, val) { return this._openDB().then(db => new Promise((res, rej) => { const tx = db.transaction(store, \"readwrite\"); tx.objectStore(store).put(val); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); })); }\n  _idbDel(store, id) { return this._openDB().then(db => new Promise((res, rej) => { const tx = db.transaction(store, \"readwrite\"); tx.objectStore(store).delete(id); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); })); }\n  openSessions = () => { this.setState({ sessionsOpen: true, sessionName: \"\", sessionError: \"\" }); this.refreshSessions(); };\n  closeSessions = () => this.setState({ sessionsOpen: false, sessionError: \"\" });\n  refreshSessions() {\n    this._idbAll(\"meta\").then(meta => {\n      meta.sort((a, b) => b.savedAt - a.savedAt);\n      const done = (storageInfo) => this.setState({ sessionList: meta, storageInfo });\n      if (navigator.storage && navigator.storage.estimate) navigator.storage.estimate().then(e => done({ usage: e.usage, quota: e.quota })).catch(() => done(null));\n      else done(null);\n    }).catch(e => this.setState({ sessionError: String(e && e.message || e) }));\n  }\n  _defaultSessionName() { const d = new Date(), p = (n) => String(n).padStart(2, \"0\"); return this.t(\"sessTitle\") + \" \" + d.getFullYear() + \"-\" + p(d.getMonth() + 1) + \"-\" + p(d.getDate()) + \" \" + p(d.getHours()) + \":\" + p(d.getMinutes()); }\n  saveSession(name) {\n    if (!this.state.logs.length) { this.setState({ sessionError: this.t(\"sessNoData\") }); return; }\n    name = (name || \"\").trim() || this._defaultSessionName();\n    this.setState({ sessionBusy: \"save\", sessionError: \"\" });\n    try {\n      const payload = this._serializeSession(); const size = JSON.stringify(payload).length;\n      const id = \"ses\" + Date.now() + Math.random().toString(36).slice(2, 5);\n      this._idbPut(\"data\", { id, payload })\n        .then(() => this._idbPut(\"meta\", { id, name, savedAt: Date.now(), size, logCount: payload.logs.length }))\n        .then(() => { this.setState({ sessionBusy: \"\", sessionName: \"\" }); this.refreshSessions(); })\n        .catch(e => this.setState({ sessionBusy: \"\", sessionError: String(e && e.message || e) }));\n    } catch (e) { this.setState({ sessionBusy: \"\", sessionError: String(e && e.message || e) }); }\n  }\n  loadSession(id) {\n    this.setState({ sessionBusy: \"load\", sessionError: \"\" });\n    this._idbGet(\"data\", id).then(rec => {\n      if (!rec) { this.setState({ sessionBusy: \"\", sessionError: this.t(\"sessMissing\") }); return; }\n      this._applySession(rec.payload);\n    }).catch(e => this.setState({ sessionBusy: \"\", sessionError: String(e && e.message || e) }));\n  }\n  deleteSession(id) {\n    if (typeof window !== \"undefined\" && window.confirm && !window.confirm(this.t(\"sessConfirmDel\"))) return;\n    Promise.all([this._idbDel(\"data\", id), this._idbDel(\"meta\", id)]).then(() => this.refreshSessions()).catch(() => {});\n  }\n  renameSession(id) {\n    const cur = this.state.sessionList.find(x => x.id === id); if (!cur) return;\n    const name = (typeof window !== \"undefined\" && window.prompt) ? window.prompt(this.t(\"sessRenamePrompt\"), cur.name) : null;\n    if (name == null) return; const nm = name.trim(); if (!nm) return;\n    this._idbPut(\"meta\", Object.assign({}, cur, { name: nm })).then(() => this.refreshSessions()).catch(() => {});\n  }\n  exportSessionFile = () => {\n    if (!this.state.logs.length) { this.setState({ sessionError: this.t(\"sessNoData\") }); return; }\n    try {\n      const payload = this._serializeSession();\n      const blob = new Blob([JSON.stringify(payload)], { type: \"application/json\" });\n      const a = document.createElement(\"a\"); a.href = URL.createObjectURL(blob);\n      a.download = (this.state.sessionName.trim() || this._defaultSessionName()) + \".amaz.json\";\n      document.body.appendChild(a); a.click();\n      setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 120);\n    } catch (e) { this.setStat   const cssW = src.width / dpr, cssH = src.height / dpr;\n      const padX = 40, padTop = 70, padBottom = 30;\n      const outCssW = cssW + padX * 2, outCssH = cssH + padTop + padBottom;\n      const scale = Math.max(dpr, 2);\n      const out = document.createElement(\"canvas\");\n      out.width = Math.round(outCssW * scale); out.height = Math.round(outCssH * scale);\n      const ctx = out.getContext(\"2d\"); ctx.setTransform(scale, 0, 0, scale, 0, 0);\n      ctx.fillStyle = C.bg2; ctx.fillRect(0, 0, outCssW, outCssH);\n      ctx.fillStyle = C.strong; ctx.font = \"600 20px system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif\"; ctx.textAlign = \"left\"; ctx.textBaseline = \"alphabetic\";\n      ctx.fillText(title, padX, 38);\n      if (subtitle) { ctx.fillStyle = C.muted; ctx.font = \"13px ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace\"; ctx.fillText(subtitle, padX, 58); }\n      ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = \"high\";\n      ctx.drawImage(src, 0, 0, src.width, src.height, padX, padTop, cssW, cssH);\n      out.toBlob((b) => {\n        if (!b) return; const url = URL.createObjectURL(b);\n        const w = window.open(\"\", \"_blank\");\n        if (w && w.document) { w.document.title = title; w.document.body.style.margin = \"0\"; w.document.body.style.background = \"#0e1016\"; const img = w.document.createElement(\"img\"); img.src = url; img.style.maxWidth = \"100%\"; img.style.display = \"block\"; img.style.margin = \"0 auto\"; w.document.body.appendChild(img); }\n        else { const aEl = document.createElement(\"a\"); aEl.href = url; aEl.download = filename + \".png\"; aEl.click(); }\n      }, \"image/png\");\n    } catch (e) {}\n  }\n  exportSpectrumImg = () => {\n    const sp = this.state.spec; const a = this.activeLog();\n    const lo = Math.min(sp.lo, sp.hi), hi = Math.max(sp.lo, sp.hi);\n    this._exportCanvasPng(this._spec, \"IR spectrum\" + (a ? \" — \" + a.name : \"\"), lo + \"\\u2013\" + hi + \" cm\\u207b\\u00b9   \\u00b7   AG Horch, FU Berlin\", \"ir_spectrum\");\n  };\n  exportMolEnergyImg = () => {\n    const a = this.activeLog();\n    this._exportCanvasPng(this._molEnergy, \"Energy ladder\" + (a ? \" — \" + a.name : \"\"), \"AG Horch, FU Berlin\", \"energy_ladder\");\n  };\n  exportCmpEnergyImg = () => {\n    const q = this.EQUANTS[this.state.compare.equantity] || this.EQUANTS[0];\n    const qn = this.state.lang === \"de\" ? q.de : q.en;\n    this._exportCanvasPng(this._energy, \"Energy comparison — \" + qn, \"AG Horch, FU Berlin\", \"energy_comparison\");\n  };\n\n  exportCsv = () => this._exportCsvFor(this.activeLog());\n  _exportCsvFor(log) {\n    const a = log ? log.analysis : null; if (!a) return;\n    const cols = [\"Mode\", \"freq_harm\", \"freq_anharm\", \"anharm_shift\", \"I_harm\", \"I_anharm\", \"red_mass\", \"PR\", \"PR_norm\", \"character\", \"composition\", \"dominant_bonds\", \"ligand_character\"];\n    const lines = [cols.join(\",\")];\n    const ligs = a.ligands || [];\n    for (const m of a.modes) {\n      const ligStr = ligs.map((g, i) => [g.name, (m.ligandShares || [])[i] || 0]).filter(x => x[1] >= 1.5).sort((x, y) => y[1] - x[1]).map(x => x[0] + \" \" + Math.round(x[1]) + \"%\").join(\"; \");\n      const row = [m.mode, this.f1(m.freqHarm), this.f1(m.freqAnharm), isFinite(m.anharmShift) ? this.f1(m.anharmShift) : \"\", this.f1(m.irHarm), this.f1(m.irAnharm), this.f2(m.redMass), this.f2(m.PR), this.f2(m.PRnorm), '\"' + m.character + '\"', '\"' + m.composition + '\"', '\"' + (m.bondLabel || \"\") + '\"', '\"' + ligStr + '\"'];\n      lines.push(row.join(\",\"));\n    }\n    const blob = new Blob([lines.join(\"\\n\")], { type: \"text/csv\" });\n    const url = URL.createObjectURL(blob); const aEl = document.createElement(\"a\");\n    const name = (log ? log.name : \"modes\").replace(/\\.[^.]+$/, \"\");\n    aEl.href = url; aEl.download = name + \"_modes.csv\"; aEl.click(); URL.revokeObjectURL(url);\n  };
